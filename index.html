<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <meta name="theme-color" content="#0b7774">
  <title>タミル語 文法の庭</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="tropical-frame" aria-hidden="true">
    <span class="sun-disc"></span>
    <span class="palm-stroke palm-stroke-a"></span>
    <span class="palm-stroke palm-stroke-b"></span>
    <span class="sea-line sea-line-a"></span>
    <span class="sea-line sea-line-b"></span>
  </div>

  <header class="hero">
    <div class="hero-copyblock">
      <p class="kicker">பேசும் தமிழ் <span>·</span> STANDARD SPOKEN TAMIL</p>
      <h1>タミル語<br><span>文法の庭</span></h1>
      <p class="hero-copy">形をほどく。音でつなぐ。映画の会話へ近づく。</p>
    </div>
    <div class="hero-emblem" aria-hidden="true">
      <span class="hero-emblem-sun"></span>
      <span class="hero-emblem-wave"></span>
      <span class="hero-emblem-kolam"></span>
    </div>
  </header>

  <nav class="lesson-tabs" id="lessonTabs" aria-label="課を選ぶ"></nav>

  <main id="app" class="app-shell" aria-live="polite"></main>

  <aside class="audio-dock" aria-label="音声設定">
    <button type="button" class="dock-stop" id="stopAudio" aria-label="音声を停止">■</button>
    <label>
      <span>速さ</span>
      <select id="speechRate">
        <option value="0.72">ゆっくり</option>
        <option value="0.88" selected>自然</option>
        <option value="1">速め</option>
      </select>
    </label>
    <label>
      <span>回数</span>
      <select id="repeatCount">
        <option value="1" selected>1回</option>
        <option value="2">2回</option>
      </select>
    </label>
    <button type="button" class="dock-play" id="playLesson">課内を再生</button>
    <span class="voice-status" id="voiceStatus" hidden></span>
  </aside>

  <div class="toast" id="toast" role="status" aria-live="polite"></div>

  <script src="lesson01.js"></script>
  <script src="lesson02.js"></script>
  <script src="lesson03.js"></script>
  <script src="lesson04.js"></script>
  <script src="app.js"></script>
</body>
</html>
