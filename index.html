<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#0b7d78">
  <meta name="description" content="標準的な口語タミル語を例文からほどく、スマートフォン向け基礎文法試作アプリ。">
  <title>சென்னை தமிழ்｜タミル語基礎文法</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="app-shell">
    <header class="topbar">
      <a class="brand" href="#top" aria-label="ページ先頭へ">
        <span class="brand-mark" aria-hidden="true"><span>த</span></span>
        <span class="brand-copy">
          <strong>சென்னை தமிழ்</strong>
          <small>タミル語基礎文法</small>
        </span>
      </a>
      <button class="menu-button" id="lessonMenuButton" type="button" aria-expanded="false" aria-controls="lessonMenu">
        <span id="currentLessonLabel">第1課</span><span aria-hidden="true">⌄</span>
      </button>
    </header>

    <nav class="lesson-menu" id="lessonMenu" aria-label="課を選ぶ" hidden></nav>

    <main id="top" class="lesson-root" tabindex="-1" aria-live="polite"></main>

    <footer class="audio-dock" aria-label="音声操作">
      <div class="audio-settings" role="group" aria-label="再生設定">
        <div class="segmented" aria-label="速度">
          <button type="button" class="setting-button is-active" data-speed="1">通常</button>
          <button type="button" class="setting-button" data-speed="0.72">ゆっくり</button>
        </div>
        <div class="segmented" aria-label="繰り返し回数">
          <button type="button" class="setting-button is-active" data-repeat="1">1回</button>
          <button type="button" class="setting-button" data-repeat="2">2回</button>
        </div>
      </div>
      <div class="audio-actions">
        <button type="button" class="dock-button dock-button-primary" id="playAllButton">
          <span aria-hidden="true">▶</span> 連続再生
        </button>
        <button type="button" class="dock-button" id="stopButton">
          <span aria-hidden="true">■</span> 停止
        </button>
      </div>
      <p class="voice-status" id="voiceStatus" role="status"></p>
    </footer>
  </div>

  <div class="toast" id="toast" role="status" aria-live="polite"></div>

  <script src="lesson01.js"></script>
  <script src="lesson02.js"></script>
  <script src="app.js"></script>
</body>
</html>
