<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#0d736f">
  <meta name="color-scheme" content="light">
  <title>口語タミル語の教科書</title>
  <meta name="description" content="文字・名詞格の早見から対話、旅行場面、文法補完へ組み上げる、チェンナイ口語タミル語の読める・聞ける教材アプリ。">
  <link rel="icon" type="image/png" href="app-icon.png">
  <link rel="apple-touch-icon" href="app-icon.png">
  <link rel="manifest" href="manifest-v28.webmanifest">
  <link rel="stylesheet" href="styles-v28.css">
</head>
<body>
  <a class="skip-link" href="#main">本文へ</a>

  <header class="app-header">
    <div class="brand-wrap">
      <button class="icon-button menu-button" id="menuButton" type="button" aria-label="章一覧を開く" aria-expanded="false" aria-controls="chapterDrawer">
        <span></span><span></span><span></span>
      </button>
      <div class="brand">
        <span class="brand-kicker">சென்னை பேச்சுத் தமிழ் · CHENNAI SPOKEN TAMIL</span>
        <strong><em>口語タミル語の教科書</em></strong>
      </div>
      <button class="icon-button settings-button" id="settingsButton" type="button" aria-label="表示設定を開く" aria-expanded="false" aria-controls="settingsPanel">Aa</button>
    </div>
    <div class="chapter-progress" aria-label="全体の進捗">
      <span id="progressLabel">第1章 / 38章</span>
      <span class="progress-track"><span id="progressFill"></span></span>
    </div>
  </header>

  <aside class="drawer" id="chapterDrawer" aria-hidden="true">
    <div class="drawer-head">
      <div>
        <span class="eyebrow">CONTENTS</span>
        <h2>音声・文字・格リファレンス版 v2.8・全38章</h2>
      </div>
      <button class="close-button" id="drawerClose" type="button" aria-label="章一覧を閉じる">×</button>
    </div>
    <section class="drawer-tools" aria-label="章を探す">
      <label class="chapter-search" for="chapterSearch">
        <span aria-hidden="true">⌕</span>
        <input id="chapterSearch" type="search" inputmode="search" autocomplete="off" placeholder="章名・文法・タミル語で検索">
      </label>
      <div class="drawer-progress-card">
        <div><strong id="drawerProgressText">0 / 38章 完了</strong><small id="drawerProgressDetail">学習ステップ 0 / 190</small></div>
        <span class="drawer-progress-track" aria-hidden="true"><span id="drawerProgressFill"></span></span>
      </div>
      <div class="drawer-quick-actions">
        <button id="resumeChapterButton" type="button">▶ 第1章から始める</button>
        <button id="incompleteFilterButton" type="button" aria-pressed="false">未完了だけ</button>
      </div>
      <div class="part-filter" id="partFilter" aria-label="部で絞り込む">
        <button type="button" data-part-filter="ALL" class="active" aria-pressed="true">全て</button>
        <button type="button" data-part-filter="PART I" aria-pressed="false">私</button>
        <button type="button" data-part-filter="PART II" aria-pressed="false">対話</button>
        <button type="button" data-part-filter="PART III" aria-pressed="false">人物</button>
        <button type="button" data-part-filter="PART IV" aria-pressed="false">動作</button>
        <button type="button" data-part-filter="PART V" aria-pressed="false">長文</button>
        <button type="button" data-part-filter="PART VI" aria-pressed="false">旅行</button>
        <button type="button" data-part-filter="PART VII" aria-pressed="false">補完</button>
      </div>
    </section>
    <nav id="chapterNav" aria-label="章一覧"></nav>
    <p class="chapter-nav-empty" id="chapterNavEmpty" hidden>条件に合う章がありません。検索語か絞り込みを変えてください。</p>
    <div class="drawer-note">
      <strong>PART 0＋基礎18章＋旅行科10章＋文法補完科10章</strong>
      <p>文字音声表と名詞格の早見へいつでも戻りつつ、既存38章を順番どおり進められます。</p>
    </div>
  </aside>
  <button class="scrim" id="drawerScrim" type="button" aria-label="章一覧を閉じる" hidden></button>

  <section class="settings-panel" id="settingsPanel" aria-hidden="true">
    <div class="settings-head">
      <div>
        <span class="eyebrow">DISPLAY</span>
        <h2>読み方の設定</h2>
      </div>
      <button class="close-button" id="settingsClose" type="button" aria-label="設定を閉じる">×</button>
    </div>
    <label class="toggle-row">
      <span><strong>カナ</strong><small>想起と音読の補助</small></span>
      <input id="toggleKana" type="checkbox" checked>
      <span class="toggle-ui" aria-hidden="true"></span>
    </label>
    <label class="toggle-row">
      <span><strong>直訳</strong><small>タミル語の組み方を見る</small></span>
      <input id="toggleLiteral" type="checkbox" checked>
      <span class="toggle-ui" aria-hidden="true"></span>
    </label>
    <label class="toggle-row">
      <span><strong>語の切れ目</strong><small>ローマ字の形態素ハイフン</small></span>
      <input id="toggleMorph" type="checkbox" checked>
      <span class="toggle-ui" aria-hidden="true"></span>
    </label>
    <div class="settings-actions">
      <button class="soft-button" id="printChapterButton" type="button">この章を印刷</button>
      <button class="soft-button" id="printBookButton" type="button">PART 0＋全38章を印刷</button>
      <button class="text-button danger-text" id="resetProgressButton" type="button">学習記録をリセット</button>
    </div>
  </section>

  <main id="main" tabindex="-1">
    <article id="lesson" class="lesson" aria-live="polite"></article>
  </main>

  <nav class="bottom-nav" aria-label="章内メニュー">
    <button type="button" data-view="read" class="active"><span>01</span>読む</button>
    <button type="button" data-view="examples"><span>02</span>例文</button>
    <button type="button" data-view="forms"><span>03</span>形</button>
    <button type="button" data-view="practice"><span>04</span>練習</button>
  </nav>

  <section class="audio-dock" id="audioDock" aria-label="音声プレーヤー" aria-hidden="true">
    <div class="now-playing">
      <span class="audio-label">NOW PLAYING</span>
      <strong id="audioTamil" lang="ta">—</strong>
      <small id="audioJapanese">文のスピーカーを押してください</small>
    </div>
    <div class="audio-controls">
      <button id="audioPrev" type="button" aria-label="前の例文">‹</button>
      <button id="audioPlay" class="audio-main" type="button" aria-label="再生・一時停止">▶</button>
      <button id="audioNext" type="button" aria-label="次の例文">›</button>
      <button id="audioStop" type="button" aria-label="停止">■</button>
      <button id="audioSpeed" class="audio-chip" type="button" aria-label="再生速度">1.0×</button>
      <button id="audioRepeat" class="audio-chip" type="button" aria-label="繰り返し回数">×1</button>
      <button id="audioClose" type="button" aria-label="プレーヤーを閉じる">×</button>
    </div>
  </section>

  <div id="toast" class="toast" role="status" aria-live="polite"></div>
  <div id="printBook" class="print-book" aria-hidden="true"></div>

  <script src="curriculum-v28.js"></script>
  <script src="travel-v28.js"></script>
  <script src="grammar-v28.js"></script>
  <script src="reference-v28.js"></script>
  <script src="transcription-v28.js"></script>
  <script src="app-v28.js"></script>
</body>
</html>
